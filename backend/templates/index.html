<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGForwarder 后台管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-5">TGForwarder 后台管理</h1>
        
        <!-- 状态监控 -->
        <div class="card mb-5">
            <div class="card-header">
                <h3>状态监控</h3>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h4>转发脚本</h4>
                        <p id="forwarder-status" class="lead">未运行</p>
                        <button id="start-forwarder" class="btn btn-success">启动</button>
                        <button id="stop-forwarder" class="btn btn-danger" disabled>停止</button>
                        <div class="mt-3">
                            <h5>输出日志</h5>
                            <div id="forwarder-output" class="border p-2 bg-light" style="height: 200px; overflow-y: scroll;"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h4>链接检测脚本</h4>
                        <p id="link-checker-status" class="lead">未运行</p>
                        <button id="start-link-checker" class="btn btn-success">启动</button>
                        <button id="stop-link-checker" class="btn btn-danger" disabled>停止</button>
                        <div class="mt-3">
                            <h5>输出日志</h5>
                            <div id="link-checker-output" class="border p-2 bg-light" style="height: 200px; overflow-y: scroll;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 配置编辑 -->
        <div class="card mb-5">
            <div class="card-header">
                <h3>配置编辑</h3>
                <button id="save-config" class="btn btn-primary float-end">保存配置</button>
            </div>
            <div class="card-body">
                <div class="row">
                    <!-- API 配置 -->
                    <div class="col-md-6 mb-4">
                        <h4>API 配置</h4>
                        <div class="mb-3">
                            <label class="form-label">API ID</label>
                            <input type="text" class="form-control" id="api_id" value="{{ config.api_id }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">API Hash</label>
                            <input type="text" class="form-control" id="api_hash" value="{{ config.api_hash }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">String Session</label>
                            <textarea class="form-control" id="string_session" rows="3">{{ config.string_session }}</textarea>
                        </div>
                    </div>
                    
                    <!-- 频道配置 -->
                    <div class="col-md-6 mb-4">
                        <h4>频道配置</h4>
                        <div class="mb-3">
                            <label class="form-label">转发目标频道</label>
                            <input type="text" class="form-control" id="forward_to_channel" value="{{ config.forward_to_channel }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">监控频道/群组（每行一个）</label>
                            <textarea class="form-control" id="channels_groups_monitor" rows="5">{{ '\n'.join(config.channels_groups_monitor) }}</textarea>
                        </div>
                    </div>
                </div>
                
                <div class="row">
                    <!-- 关键词配置 -->
                    <div class="col-md-6 mb-4">
                        <h4>关键词配置</h4>
                        <div class="mb-3">
                            <label class="form-label">包含关键词（每行一个）</label>
                            <textarea class="form-control" id="include" rows="5">{{ '\n'.join(config.include) }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">排除关键词（每行一个）</label>
                            <textarea class="form-control" id="exclude" rows="5">{{ '\n'.join(config.exclude) }}</textarea>
                        </div>
                    </div>
                    
                    <!-- 其他配置 -->
                    <div class="col-md-6 mb-4">
                        <h4>其他配置</h4>
                        <div class="mb-3">
                            <label class="form-label">监控最近消息数</label>
                            <input type="number" class="form-control" id="limit" value="{{ config.limit }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">检测去重消息数</label>
                            <input type="number" class="form-control" id="checknum" value="{{ config.checknum }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">监控评论数</label>
                            <input type="number" class="form-control" id="replies_limit" value="{{ config.replies_limit }}">
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="check_replies" {% if config.check_replies %}checked{% endif %}>
                                <label class="form-check-label">监控评论</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="try_join" {% if config.try_join %}checked{% endif %}>
                                <label class="form-check-label">尝试加入频道</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="past_years" {% if config.past_years %}checked{% endif %}>
                                <label class="form-check-label">允许转发往年资源</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="only_today" {% if config.only_today %}checked{% endif %}>
                                <label class="form-check-label">仅转发当日消息</label>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 链接检测配置 -->
                <div class="row">
                    <div class="col-md-12 mb-4">
                        <h4>链接检测配置</h4>
                        <div class="row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">检测模式</label>
                                    <select class="form-select" id="delete_mode">
                                        <option value="1" {% if config.link_checker.delete_mode == 1 %}selected{% endif %}>检测并删除</option>
                                        <option value="2" {% if config.link_checker.delete_mode == 2 %}selected{% endif %}>仅检测</option>
                                        <option value="3" {% if config.link_checker.delete_mode == 3 %}selected{% endif %}>仅删除已标记</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">检测消息数</label>
                                    <input type="number" class="form-control" id="limit_link" value="{{ config.link_checker.limit }}">
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label class="form-label">并发数</label>
                                    <input type="number" class="form-control" id="concurrency" value="{{ config.link_checker.concurrency }}">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="recheck" {% if config.link_checker.recheck %}checked{% endif %}>
                                <label class="form-check-label">重新检测失效链接</label>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">检测的网盘域名（每行一个）</label>
                            <textarea class="form-control" id="net_disk_domains" rows="3">{{ '\n'.join(config.link_checker.net_disk_domains) }}</textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 实时更新状态
        function updateStatus() {
            $.get('/get_status', function(data) {
                // 更新转发脚本状态
                if (data.forwarder.running) {
                    $('#forwarder-status').text('运行中').removeClass('text-muted').addClass('text-success');
                    $('#start-forwarder').prop('disabled', true);
                    $('#stop-forwarder').prop('disabled', false);
                } else {
                    $('#forwarder-status').text('未运行').removeClass('text-success').addClass('text-muted');
                    $('#start-forwarder').prop('disabled', false);
                    $('#stop-forwarder').prop('disabled', true);
                }
                
                // 更新链接检测脚本状态
                if (data.link_checker.running) {
                    $('#link-checker-status').text('运行中').removeClass('text-muted').addClass('text-success');
                    $('#start-link-checker').prop('disabled', true);
                    $('#stop-link-checker').prop('disabled', false);
                } else {
                    $('#link-checker-status').text('未运行').removeClass('text-success').addClass('text-muted');
                    $('#start-link-checker').prop('disabled', false);
                    $('#stop-link-checker').prop('disabled', true);
                }
            });
        }
        
        // 更新脚本输出
        function updateOutput() {
            $.get('/get_output/forwarder', function(data) {
                $('#forwarder-output').text(data.output.join('\n'));
                $('#forwarder-output').scrollTop($('#forwarder-output')[0].scrollHeight);
            });
            
            $.get('/get_output/link_checker', function(data) {
                $('#link-checker-output').text(data.output.join('\n'));
                $('#link-checker-output').scrollTop($('#link-checker-output')[0].scrollHeight);
            });
        }
        
        // 启动转发脚本
        $('#start-forwarder').click(function() {
            $.get('/start_forwarder', function(data) {
                if (data.status === 'success') {
                    alert('转发脚本启动成功');
                } else {
                    alert('启动失败: ' + data.message);
                }
            });
        });
        
        // 停止转发脚本
        $('#stop-forwarder').click(function() {
            $.get('/stop_forwarder', function(data) {
                if (data.status === 'success') {
                    alert('转发脚本停止成功');
                } else {
                    alert('停止失败: ' + data.message);
                }
            });
        });
        
        // 启动链接检测脚本
        $('#start-link-checker').click(function() {
            $.get('/start_link_checker', function(data) {
                if (data.status === 'success') {
                    alert('链接检测脚本启动成功');
                } else {
                    alert('启动失败: ' + data.message);
                }
            });
        });
        
        // 停止链接检测脚本
        $('#stop-link-checker').click(function() {
            $.get('/stop_link_checker', function(data) {
                if (data.status === 'success') {
                    alert('链接检测脚本停止成功');
                } else {
                    alert('停止失败: ' + data.message);
                }
            });
        });
        
        // 保存配置
        $('#save-config').click(function() {
            var config = {
                api_id: parseInt($('#api_id').val()),
                api_hash: $('#api_hash').val(),
                string_session: $('#string_session').val(),
                forward_to_channel: $('#forward_to_channel').val(),
                channels_groups_monitor: $('#channels_groups_monitor').val().split('\n').filter(function(item) { return item.trim() !== ''; }),
                include: $('#include').val().split('\n').filter(function(item) { return item.trim() !== ''; }),
                exclude: $('#exclude').val().split('\n').filter(function(item) { return item.trim() !== ''; }),
                limit: parseInt($('#limit').val()),
                checknum: parseInt($('#checknum').val()),
                replies_limit: parseInt($('#replies_limit').val()),
                check_replies: $('#check_replies').prop('checked'),
                try_join: $('#try_join').prop('checked'),
                past_years: $('#past_years').prop('checked'),
                only_today: $('#only_today').prop('checked'),
                link_checker: {
                    delete_mode: parseInt($('#delete_mode').val()),
                    limit: parseInt($('#limit_link').val()),
                    concurrency: parseInt($('#concurrency').val()),
                    recheck: $('#recheck').prop('checked'),
                    net_disk_domains: $('#net_disk_domains').val().split('\n').filter(function(item) { return item.trim() !== ''; })
                }
            };
            
            $.ajax({
                url: '/save_config',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(config),
                success: function(data) {
                    if (data.status === 'success') {
                        alert('配置保存成功');
                    } else {
                        alert('保存失败');
                    }
                }
            });
        });
        
        // 定时更新状态和输出
        setInterval(updateStatus, 1000);
        setInterval(updateOutput, 2000);
        
        // 初始化
        updateStatus();
        updateOutput();
    </script>
</body>
</html>
